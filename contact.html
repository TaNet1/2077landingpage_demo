<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系商务 - 2077.AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://unpkg.com/lenis@1.3.23/dist/lenis.css">
    <script src="https://unpkg.com/lenis@1.3.23/dist/lenis.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="i18n.js"></script>
    <link rel="stylesheet" href="page.css">
    <link rel="stylesheet" href="site.css">
</head>
<body>
    <div id="site-nav"></div>

    <header class="page-hero">
        <div class="container">
            <div class="eyebrow">Contact</div>
            <h1 class="font-sora">联系商务，<br><span class="gradient-text">评估你的 AI 虚拟员工方案</span></h1>
            <p class="lead">告诉我们你的服务空间、客流规模与业务目标，我们会评估适合的产品组合、部署方式和落地路径。</p>
        </div>
    </header>

    <section id="contact" class="section soft">
        <div class="container grid lg:grid-cols-2 gap-20 items-center">
            <div>
                <div class="eyebrow">Contact Sales</div>
                <h2 class="section-title">为你的服务空间，<br><span class="gradient-text">配一位永不下班的 AI 员工</span></h2>
                <p class="section-copy">直接联系我们的商务顾问，定制专属你场景的解决方案。我们将在 24 小时内响应。</p>

                <div class="space-y-8 mt-12">
                    <div class="flex items-center gap-6">
                        <div class="w-10 h-10 rounded-full bg-white shadow-sm flex items-center justify-center text-purple-600"><i data-lucide="phone" class="w-5 h-5"></i></div>
                        <div><p class="text-xs text-gray-400 font-bold uppercase">商务直线（Molly）</p><p class="font-bold font-sora">186 7638 7250</p></div>
                    </div>
                    <div class="flex items-center gap-6">
                        <div class="w-10 h-10 rounded-full bg-white shadow-sm flex items-center justify-center text-purple-600"><i data-lucide="mail" class="w-5 h-5"></i></div>
                        <div><p class="text-xs text-gray-400 font-bold uppercase">邮件咨询</p><p class="font-bold">Molly@2077.ai</p></div>
                    </div>
                    <div class="flex items-center gap-6">
                        <div class="w-10 h-10 rounded-full bg-white shadow-sm flex items-center justify-center text-purple-600"><i data-lucide="globe" class="w-5 h-5"></i></div>
                        <div><p class="text-xs text-gray-400 font-bold uppercase">官方网站</p><p class="font-bold font-sora">www.2077.ai</p></div>
                    </div>
                    <div class="flex items-center gap-6">
                        <div class="w-10 h-10 rounded-full bg-white shadow-sm flex items-center justify-center text-purple-600"><i data-lucide="map-pin" class="w-5 h-5"></i></div>
                        <div><p class="text-xs text-gray-400 font-bold uppercase">总部地址</p><p class="font-bold">深圳前海深港青年梦工场北区 C 栋 202</p></div>
                    </div>
                </div>
            </div>

            <div class="bg-white p-8 md:p-12 rounded-[40px] shadow-2xl border border-gray-100">
                <form class="space-y-6" onsubmit="return false;">
                    <div class="grid gap-6 md:grid-cols-2">
                        <div class="space-y-2">
                            <label class="text-sm font-bold text-gray-700 ml-1">您的姓名</label>
                            <input type="text" placeholder="请输入您的称呼" class="w-full bg-slate-50 border-none px-6 py-4 rounded-2xl focus:ring-2 focus:ring-purple-200 transition-all outline-none">
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm font-bold text-gray-700 ml-1">联系电话</label>
                            <input type="tel" placeholder="请输入手机号码" class="w-full bg-slate-50 border-none px-6 py-4 rounded-2xl focus:ring-2 focus:ring-purple-200 transition-all outline-none">
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm font-bold text-gray-700 ml-1">邮箱地址</label>
                        <input type="email" placeholder="请输入邮箱地址" class="w-full bg-slate-50 border-none px-6 py-4 rounded-2xl focus:ring-2 focus:ring-purple-200 transition-all outline-none">
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm font-bold text-gray-700 ml-1">公司名称</label>
                        <input type="text" placeholder="您的企业或组织名称" class="w-full bg-slate-50 border-none px-6 py-4 rounded-2xl focus:ring-2 focus:ring-purple-200 transition-all outline-none">
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm font-bold text-gray-700 ml-1">咨询需求</label>
                        <textarea rows="4" placeholder="请简述您的应用场景或定制需求..." class="w-full bg-slate-50 border-none px-6 py-4 rounded-2xl focus:ring-2 focus:ring-purple-200 transition-all outline-none resize-none"></textarea>
                    </div>
                    <button type="submit" class="w-full gradient-bg text-white py-5 rounded-2xl font-bold text-lg shadow-xl shadow-purple-200 hover:scale-[1.01] active:scale-[0.99] transition-all">立即提交申请</button>
                </form>
            </div>
        </div>
    </section>

    <div id="site-footer"></div>
    <div id="site-fab"></div>
    <script src="site.js"></script>
</body>
</html>
