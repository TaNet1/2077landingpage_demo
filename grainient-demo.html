<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grainient Demo - 2077.AI</title>
  <link rel="stylesheet" href="grainient.css">
  <style>
    * { margin: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body { font-family: system-ui, 'Segoe UI', sans-serif; color: #fff; }

    /* Two stages, one per preset, stacked full-viewport. */
    .stage { position: relative; min-height: 100vh; display: grid; place-items: center; overflow: hidden; }
    .stage .grainient-bg { z-index: 0; }
    .stage-content { position: relative; z-index: 1; text-align: center; padding: 24px; }
    .stage-content h1 { font-size: clamp(40px, 8vw, 96px); font-weight: 800; letter-spacing: -0.03em; line-height: 1.02; }
    .stage-content p { margin-top: 16px; font-size: clamp(15px, 1.4vw, 19px); opacity: .92; }
    .badge { display:inline-block; margin-bottom:20px; padding:6px 14px; border-radius:999px; font-size:12px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; }

    /* Dark stage: light text. Light stage: dark text. */
    .stage--dark { color:#fff; }
    .stage--dark h1, .stage--dark p { text-shadow: 0 4px 40px rgba(0,0,0,.35); }
    .stage--dark .badge { background:rgba(255,255,255,.16); }
    .stage--light { color:#1a1530; }
    .stage--light .badge { background:rgba(26,21,48,.10); }
  </style>
</head>
<body>
  <section class="stage stage--dark">
    <div class="grainient-bg" data-grainient="dark"></div>
    <div class="stage-content">
      <span class="badge">Grainient · DARK</span>
      <h1>暗色版背景</h1>
      <p>用于深色区块（#16161A / #2A0B4C / #4c4c4c · timeSpeed 1.25）</p>
    </div>
  </section>

  <section class="stage stage--light">
    <div class="grainient-bg" data-grainient="light"></div>
    <div class="stage-content">
      <span class="badge">Grainient · LIGHT</span>
      <h1>明亮版背景</h1>
      <p>用于浅色区块（#e2cff6 / #FFE5F1 / #ada1c4 · timeSpeed 1.25）</p>
    </div>
  </section>

  <script type="module" src="grainient.js"></script>
</body>
</html>
